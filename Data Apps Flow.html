<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Apps · Keboola — Original Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components/icons.jsx"></script>
  <script type="text/babel" src="components/shared.jsx"></script>
  <script type="text/babel" src="components/directory.jsx"></script>
  <script type="text/babel" src="components/builder.jsx"></script>
  <script type="text/babel" src="components/detail.jsx"></script>
  <script type="text/babel" src="components/states.jsx"></script>

  <script type="text/babel">
    const DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent_hue": 295,
      "density": "comfortable",
      "sidebar": "show"
    }/*EDITMODE-END*/;

    function applyTweaks(t) {
      document.documentElement.style.setProperty('--accent', `oklch(0.58 0.22 ${t.accent_hue})`);
      document.documentElement.style.setProperty('--accent-2', `oklch(0.52 0.24 ${t.accent_hue})`);
      document.documentElement.style.setProperty('--accent-soft', `oklch(0.96 0.03 ${t.accent_hue})`);
      document.documentElement.style.setProperty('--accent-soft-border', `oklch(0.88 0.08 ${t.accent_hue})`);
      document.documentElement.style.setProperty('--kai', `oklch(0.58 0.22 ${t.accent_hue})`);
      document.documentElement.style.setProperty('--kai-grad',
        `linear-gradient(135deg, oklch(0.62 0.22 ${(t.accent_hue + 15) % 360}), oklch(0.55 0.22 ${(t.accent_hue - 25 + 360) % 360}))`);
    }

    function App() {
      const [route, setRoute] = React.useState(() => {
        const stored = (() => { try { return localStorage.getItem('kb-route') || 'directory'; } catch { return 'directory'; } })();
        return stored;
      });
      const [tweaks, setTweaks] = React.useState(DEFAULTS);
      const [editMode, setEditMode] = React.useState(false);
      const [detailTab, setDetailTab] = React.useState('overview');
      const [kaiOpen, setKaiOpen] = React.useState(false);

      const navigate = (r) => {
        setRoute(r);
        if (r.startsWith('detail')) setDetailTab('overview');
        if (r.startsWith('builder')) setKaiOpen(false);
        try { localStorage.setItem('kb-route', r); } catch {}
      };

      React.useEffect(() => { applyTweaks(tweaks); }, [tweaks]);

      // Edit mode wiring (for Tweaks toggle)
      React.useEffect(() => {
        const onMsg = (e) => {
          const d = e.data || {};
          if (d.type === '__activate_edit_mode') setEditMode(true);
          if (d.type === '__deactivate_edit_mode') setEditMode(false);
        };
        window.addEventListener('message', onMsg);
        try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}
        return () => window.removeEventListener('message', onMsg);
      }, []);

      const setTweak = (key, val) => {
        const next = { ...tweaks, [key]: val };
        setTweaks(next);
        try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*'); } catch {}
      };

      const [view, ...rest] = route.split(':');
      const appId = rest.join(':');
      const app = (view === 'detail' || view === 'builder') ? APPS.find(a => a.id === appId) || APPS[0] : null;
      const showChat = kaiOpen && view !== 'builder';

      return (
        <div className={`app ${(tweaks.sidebar === 'hide' && view !== 'directory') || view === 'builder' ? 'fullscreen' : ''} ${showChat ? 'kai-open' : ''}`} data-screen-label={`0${['directory','builder','detail','states'].indexOf(view) + 1} ${view}`}>
          <Navbar view={view} isKaiOpen={showChat} onKaiToggle={() => setKaiOpen(open => !open)} />
          {!((tweaks.sidebar === 'hide' && view !== 'directory') || view === 'builder') && <Sidebar route={route} navigate={navigate} detailTab={detailTab} setDetailTab={setDetailTab} app={app} />}
          <div className="main">
            {view === 'directory' && <Directory navigate={navigate} />}
            {view === 'builder' && <Builder navigate={navigate} appId={appId} />}
            {view === 'detail' && <Detail navigate={navigate} appId={appId} tab={detailTab} setTab={setDetailTab} />}
            {view === 'states' && <StatesPage navigate={navigate} />}
          </div>
          {showChat && <ChatPanel />}

          {/* Route switcher — always visible for walkthrough */}
          <div style={{
            position: 'fixed', left: '50%', bottom: 14, transform: 'translateX(-50%)',
            display: 'flex', gap: 4, padding: 4,
            background: 'rgba(10,10,10,0.92)', color: '#fff',
            borderRadius: 999, fontSize: 12,
            boxShadow: '0 8px 30px rgba(0,0,0,0.25)',
            zIndex: 90,
            backdropFilter: 'blur(8px)',
          }}>
            {[
              { id: 'directory', label: '1 · Directory' },
              { id: 'builder:rev-ops', label: '2 · Builder' },
              { id: 'detail:rev-ops', label: '3 · Detail' },
              { id: 'states', label: '4 · States & System' },
            ].map(r => (
              <button
                key={r.id}
                onClick={() => navigate(r.id)}
                style={{
                  padding: '6px 12px',
                  borderRadius: 999,
                  background: route === r.id ? '#fff' : 'transparent',
                  color: route === r.id ? '#0a0a0a' : '#d4d4d8',
                  fontWeight: route === r.id ? 600 : 400,
                  transition: 'background 0.15s',
                  fontSize: 12,
                }}
              >
                {r.label}
              </button>
            ))}
          </div>

          {editMode && (
            <div className="tweaks">
              <div className="tweaks-header">
                <div className="tweaks-title">Tweaks</div>
                <div style={{ fontSize: 10, color: 'var(--text-3)', fontFamily: 'var(--font-mono)' }}>live</div>
              </div>
              <div className="tweaks-group">
                <div className="tweaks-label">Accent hue · {tweaks.accent_hue}°</div>
                <input
                  type="range" min="0" max="360" value={tweaks.accent_hue}
                  onChange={e => setTweak('accent_hue', Number(e.target.value))}
                  style={{ width: '100%' }}
                />
              </div>
              <div className="tweaks-group">
                <div className="tweaks-label">Density</div>
                <div className="tweaks-row">
                  {['compact','comfortable','roomy'].map(d => (
                    <button key={d} className={`tweaks-btn ${tweaks.density === d ? 'active' : ''}`} onClick={() => setTweak('density', d)}>{d}</button>
                  ))}
                </div>
              </div>
              <div className="tweaks-group">
                <div className="tweaks-label">Sidebar (on builder/detail)</div>
                <div className="tweaks-row">
                  {['show','hide'].map(d => (
                    <button key={d} className={`tweaks-btn ${tweaks.sidebar === d ? 'active' : ''}`} onClick={() => setTweak('sidebar', d)}>{d}</button>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
